name: PR Preview

on:
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # Skip PRs from forks — they cannot access secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Pin previews to the dev sandbox so clicking through a PR preview writes to
      # signups_dev — never the real event data.
      - name: Build web (Expo export, pinned to dev sandbox)
        run: EXPO_PUBLIC_ENV=dev npx expo export -p web

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: fanfest-app
          expires: 7d
